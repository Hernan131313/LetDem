<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Confirm Your Email - LetDem</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #2e2e2e;
      padding: 40px;
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: auto;
      padding: 40px;
    }
    .logo {
      color: #9c4dff;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 30px;
    }
    .logo span {
      color: #000;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #1f1f1f;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #2e2e2e;
    }
    .otp-box {
      background-color: #f2f3f5;
      padding: 25px;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      color: #9c4dff;
      letter-spacing: 5px;
      border-radius: 15px;
      margin: 30px 0;
    }
    .support {
      color: #9c4dff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LetDem</div>
    <h1>Confirm your email</h1>
    <p>To confirm your email, please use the one-time password below:</p>
    <div class="otp-box">{{ verification_code }}</div>
    <p>This code is valid for the next {{ expiration_in_minutes }} minutes</p>
    <p>If you didn’t make this request, kindly ignore it.</p>
    <p>Thanks,<br>LetDem Team</p>
  </div>
</body>
</html>
